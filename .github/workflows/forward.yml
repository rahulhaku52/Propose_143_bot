name: Auto Forward

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  forward:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install requests

      - name: Check Secrets
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_IDS: ${{ secrets.CHANNEL_IDS }}
        run: |
          echo "BOT_TOKEN:"
          [ -n "$BOT_TOKEN" ] && echo "FOUND" || echo "MISSING"

          echo "CHANNEL_IDS:"
          [ -n "$CHANNEL_IDS" ] && echo "FOUND" || echo "MISSING"

      - name: Run Forwarder
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_IDS: ${{ secrets.CHANNEL_IDS }}
        run: python forwarder.py
